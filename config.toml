baseURL = "https://simosmanis.gr/"
title = "Simos Manis | Software Engineer"
theme = "hugo-coder"
locale = "en"
defaultContentLanguage = "en"
# No blog posts/pages exist, so skip generating the (empty) taxonomy
# list/term pages (/categories/, /tags/), their sitemap entries, and
# the RSS feed (which would otherwise just contain the homepage).
disableKinds = ["taxonomy", "term", "RSS"]
[pagination]
    pagerSize = 10
enableEmoji = true
enableRobotsTXT = true

# Enable Disqus comments
# disqusShortname = "yourdiscussshortname"

[markup.highlight]
noClasses = false

[params]
author = "Simos Manis"
# license = '<a rel="license" href="http://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA-4.0</a>'
description = "Simos Manis personal website"
keywords = "software engineer,portfolio,developer"
info = ["Software Engineer"]
avatarURL = "images/profile_photo.webp"
images = ["images/profile_photo.webp"]

#gravatar = "john.doe@example.com"
#dateFormat = "January 2, 2006"
#since = 2019
# Git Commit in Footer, uncomment the line below to enable it
#commit = "https://github.com/luizdepra/hugo-coder/tree/"
# Right To Left, shift content direction for languagues such as Arabic
rtl = false
# Specify light/dark colorscheme
# Supported values:
# "auto" (use preference set by browser)
# "dark" (dark background, light foreground)
# "light" (light background, dark foreground) (default)
colorScheme = "auto"
# Hide the toggle button, along with the associated vertical divider
hideColorSchemeToggle = false
# Series see also post count
maxSeeAlsoItems = 5
# Custom CSS
customCSS = []
# Custom SCSS, file path is relative to Hugo's asset folder (default: {your project root}/assets)
customSCSS = []

# Custom JS
customJS = []

# Custom remote JS files
customRemoteJS = []

[[params.social]]
name = "Github"
weight = 1
url = "https://github.com/symeonmanis/"

[[params.social]]
name = "Email"
weight = 3
url = "mailto:simosmanis@gmail.com"
