name: Build check

# Safety net for PRs (including Dependabot's github-actions and
# gitsubmodule bumps): validates the site actually builds before merge,
# since a theme/action update can break the build without warning
# otherwise (see the Font Awesome library switch in hugo-coder v1.2).
on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_ENVIRONMENT: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Read pinned Hugo version
        id: hugo
        run: |
          echo "version=$(grep -oP '(?<=HUGO_VERSION: ).*' .github/workflows/deploy.yaml)" >> "$GITHUB_OUTPUT"

      - name: Install Hugo CLI
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${{ steps.hugo.outputs.version }}/hugo_extended_${{ steps.hugo.outputs.version }}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Build with Hugo
        run: hugo --gc --minify --baseURL "https://simosmanis.gr/"